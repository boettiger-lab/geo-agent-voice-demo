<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo-Agent — Voice Input Demo</title>

    <!--
        Demo app for the optional voice-input layer (refs boettiger-lab/geo-agent#131).
        Pinned to the `voice-input-explore` branch of the core library so the
        MediaRecorder-based mic button and multimodal `input_audio` plumbing
        are available. Switch to @main or a tagged release once the feature merges.
    -->
    <script type="importmap">
    {
        "imports": {
            "@modelcontextprotocol/sdk/client/index.js": "https://esm.sh/@modelcontextprotocol/sdk@1.12.0/client/index",
            "@modelcontextprotocol/sdk/client/streamableHttp.js": "https://esm.sh/@modelcontextprotocol/sdk@1.12.0/client/streamableHttp"
        }
    }
    </script>

    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@5.22.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@5.22.0/dist/maplibre-gl.css" rel="stylesheet" />

    <!-- PMTiles protocol -->
    <script src="https://unpkg.com/pmtiles@3.0.7/dist/pmtiles.js"></script>

    <!-- h3-js (for hex grid overlay) -->
    <script src="https://unpkg.com/h3-js@4.1.0/dist/h3-js.umd.js"></script>

    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Code highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>

    <!-- Core styles (voice-input-explore branch) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/boettiger-lab/geo-agent@voice-input-explore/app/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/boettiger-lab/geo-agent@voice-input-explore/app/chat.css">
</head>

<body>
    <!-- Map -->
    <div id="map"></div>

    <!-- Layer controls — generated by MapManager.generateMenu() -->
    <div id="menu"></div>

    <!-- Chat interface -->
    <div id="chat-container">
        <div id="chat-header">
            <h3>Voice Assistant</h3>
            <button id="chat-toggle" title="Toggle chat">−</button>
        </div>
        <div id="chat-messages"></div>
        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="Type or press the mic to speak…" autocomplete="off">
            <!-- Mic button is injected by the voice-input-explore branch and
                 revealed only when an audio-capable model is selected. -->
            <button id="chat-mic" title="Hold to record voice input" hidden>🎤</button>
            <button id="chat-send">Send</button>
        </div>
        <div id="chat-footer">
            <select id="model-selector" title="Select model"></select>
        </div>
    </div>

    <!-- Boot from CDN (voice-input-explore branch) -->
    <script type="module" src="https://cdn.jsdelivr.net/gh/boettiger-lab/geo-agent@voice-input-explore/app/main.js"></script>
</body>

</html>

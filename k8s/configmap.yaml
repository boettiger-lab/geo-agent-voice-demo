# LLM config template — API keys injected from k8s secrets at deploy time.
#
# Voice pipeline (two-phase, see geo-agent PR #137):
#   1. Recorded audio is sent to `transcription_model` (gemma-4-e4b, the
#      audio-capable Gemma 4 variant on NRP).
#   2. The resulting text is passed to the selected agent model — any of
#      the text-only reasoning models below — for the normal tool-use loop.
#
# The mic button appears whenever `transcription_model` is set, regardless
# of which agent model the user has selected.
apiVersion: v1
kind: ConfigMap
metadata:
  name: voice-demo-config
data:
  config.template.json: |
    {
        "mcp_server_url": "${MCP_SERVER_URL}",
        "mcp_auth_token": "${MCP_AUTH_TOKEN}",
        "llm_model": "minimax-m2",
        "llm_models": [
            {
                "value": "minimax-m2",
                "label": "NRP MiniMax M2",
                "endpoint": "${LLM_ENDPOINT}",
                "api_key": "${PROXY_KEY}"
            },
            {
                "value": "glm-4.7",
                "label": "NRP GLM-4.7",
                "endpoint": "${LLM_ENDPOINT}",
                "api_key": "${PROXY_KEY}"
            },
            {
                "value": "qwen3",
                "label": "NRP Qwen3",
                "endpoint": "${LLM_ENDPOINT}",
                "api_key": "${PROXY_KEY}"
            },
            {
                "value": "kimi",
                "label": "NRP Kimi",
                "endpoint": "${LLM_ENDPOINT}",
                "api_key": "${PROXY_KEY}"
            },
            {
                "value": "gpt-oss",
                "label": "NRP GPT-OSS",
                "endpoint": "${LLM_ENDPOINT}",
                "api_key": "${PROXY_KEY}"
            },
            {
                "value": "gemma",
                "label": "NRP Gemma (31B, text)",
                "endpoint": "${LLM_ENDPOINT}",
                "api_key": "${PROXY_KEY}"
            }
        ],
        "transcription_model": {
            "value": "gemma-4-e4b",
            "endpoint": "${LLM_ENDPOINT}",
            "api_key": "${PROXY_KEY}"
        }
    }

---
# Nginx configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: voice-demo-nginx
data:
  nginx.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Accept";

        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

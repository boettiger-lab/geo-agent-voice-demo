# LLM config template — NO SECRETS.
#
# Both the agent models and the transcription model reach
# open-llm-proxy through nginx's /api/llm/ reverse proxy, which injects
# the Authorization header server-side from ${PROXY_KEY}. The browser
# only ever sees a relative endpoint.
#
# See ../../geo-agent-ops/SECRETS_EXPOSURE.md for the migration plan.
#
# Voice pipeline (two-phase, see geo-agent PR #137):
#   1. Recorded audio is sent to `transcription_model` (gemma-4-e4b, the
#      audio-capable Gemma 4 variant on NRP).
#   2. The resulting text is passed to the selected agent model — any of
#      the text-only reasoning models below — for the normal tool-use loop.
#
# The mic button appears whenever `transcription_model` is set, regardless
# of which agent model the user has selected.
apiVersion: v1
kind: ConfigMap
metadata:
  name: voice-demo-config
data:
  config.template.json: |
    {
        "mcp_server_url": "${MCP_SERVER_URL}",
        "llm_model": "minimax-m2",
        "llm_models": [
            {
                "value": "minimax-m2",
                "label": "NRP MiniMax M2",
                "endpoint": "/api/llm",
                "api_key": "unused"
            },
            {
                "value": "glm-4.7",
                "label": "NRP GLM-4.7",
                "endpoint": "/api/llm",
                "api_key": "unused"
            },
            {
                "value": "qwen3",
                "label": "NRP Qwen3",
                "endpoint": "/api/llm",
                "api_key": "unused"
            },
            {
                "value": "kimi",
                "label": "NRP Kimi",
                "endpoint": "/api/llm",
                "api_key": "unused"
            },
            {
                "value": "gpt-oss",
                "label": "NRP GPT-OSS",
                "endpoint": "/api/llm",
                "api_key": "unused"
            },
            {
                "value": "gemma",
                "label": "NRP Gemma (31B, text)",
                "endpoint": "/api/llm",
                "api_key": "unused"
            }
        ],
        "transcription_model": {
            "value": "gemma-4-e4b",
            "endpoint": "/api/llm",
            "api_key": "unused"
        }
    }

---
# Nginx configuration — reverse-proxies /api/llm/ to open-llm-proxy and
# injects the Authorization header from ${PROXY_KEY} at container start
# (the startup command runs envsubst over this file). The browser never
# receives the key.
apiVersion: v1
kind: ConfigMap
metadata:
  name: voice-demo-nginx
data:
  nginx.conf.template: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Accept";

        # ── Reverse proxy to open-llm-proxy ──────────────────────────
        # Clients POST to /api/llm/chat/completions with a dummy bearer
        # token; nginx rewrites the Authorization header using the
        # ${PROXY_KEY} substituted in at container startup.
        location /api/llm/ {
            proxy_pass https://open-llm-proxy.nrp-nautilus.io/v1/;
            proxy_set_header Authorization "Bearer ${PROXY_KEY}";
            proxy_set_header Host open-llm-proxy.nrp-nautilus.io;
            proxy_ssl_server_name on;

            # Allow long agent loops (multi-turn tool use) and ~1 MB
            # audio bodies from the transcription model.
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 10m;

            # Don't buffer streaming responses
            proxy_buffering off;
        }

        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
